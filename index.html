<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxonomy Quiz</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
}

.quiz-container {
  background: white;
  padding: 20px;
  margin: 50px auto;
  width: 60%;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 5px;
  background: gray;
  color: white;
  cursor: pointer;
}

button:hover {
  background: black;
}

.progress-bar {
  width: 100%;
  background: #ddd;
  border-radius: 10px;
  margin-bottom: 15px;
}

.progress {
  height: 10px;
  width: 0%;
  background: #4caf50;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="quiz-container">
  <div class="progress-bar"><div id="progress" class="progress"></div></div>
  <h3 id="counter"></h3>
  <h2 id="question">Question</h2>
  <div id="answers"></div>
  <h3 id="score"></h3>
</div>

<script>

const quiz = [
  {q:"What is taxonomy?",a:["Study of space","Classification of living things","Study of rocks","Study of weather"],correct:1},

  {q:"Who is known as the Father of Taxonomy?",a:["Newton","Darwin","Linnaeus","Einstein"],correct:2},

  {q:"What is the correct order of classification?",a:[
    "Species → Kingdom → Genus",
    "Kingdom → Phylum → Class → Order → Family → Genus → Species",
    "Genus → Family → Order",
    "Class → Species → Kingdom"],correct:1},

  {q:"Which kingdom includes organisms that make their own food?",a:["Animalia","Fungi","Plantae","Protista"],correct:2},

  {q:"Which kingdom includes humans?",a:["Plantae","Fungi","Animalia","Protista"],correct:2},

  {q:"Which kingdom includes mushrooms and molds?",a:["Animalia","Fungi","Protista","Bacteria"],correct:1},

  {q:"Protists are usually...",a:["Multicellular","Single-celled","Plants only","Animals only"],correct:1},

  {q:"Bacteria are...",a:["Multicellular","Have a nucleus","Single-celled without nucleus","Plants"],correct:2},

  {q:"What is binomial nomenclature?",a:["One-word naming","Two-part scientific naming","Color naming","Number system"],correct:1},

  {q:"What is a species?",a:["Random group","Largest group","Group that can reproduce","Cell type"],correct:2},

  {q:"What level comes right before species?",a:["Kingdom","Genus","Family","Class"],correct:1},

  {q:"Fungi get nutrients by...",a:["Photosynthesis","Absorption","Hunting","Breathing"],correct:1},

  {q:"Which group has a nucleus?",a:["Bacteria","Eukarya","Archaea","Viruses"],correct:1},

  {q:"What is the largest classification group?",a:["Species","Genus","Kingdom","Domain"],correct:3},

  {q:"Why do scientists classify organisms?",a:["To confuse","To organize and understand life","To name randomly","To draw pictures"],correct:1}
];

let current = 0;
let score = 0;

function loadQuestion() {
  const q = quiz[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("counter").innerText = `Question ${current+1}/${quiz.length}`;

  document.getElementById("progress").style.width = ((current/quiz.length)*100) + "%";

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((answer, index) => {
    const btn = document.createElement("button");
    btn.innerText = answer;
    btn.onclick = () => checkAnswer(index);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(index) {
  if (index === quiz[current].correct) score++;

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    document.getElementById("progress").style.width = "100%";
    document.getElementById("question").innerText = "Quiz Finished!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("counter").innerText = "";

    let message = "";
    if (score === quiz.length) {
      message = "Perfect! 🧠🔥";
    } else if (score > quiz.length/2) {
      message = "Great job! 👍";
    } else {
      message = "Keep studying! 📘";
    }

    document.getElementById("score").innerText = `Score: ${score}/${quiz.length} - ${message}`;
  }
}

loadQuestion();

</script>

</body>
</html>
