<!DOCTYPE html>
<html>
<head>
  <title>Breakout Game</title>
  <style>
    canvas { background: #111; display: block; margin: auto; }
  </style>
</head>
<body>

<canvas id="game" width="480" height="320"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let x = canvas.width/2;
let y = canvas.height-30;
let dx = 2;
let dy = -2;

let paddleHeight = 10;
let paddleWidth = 75;
let paddleX = (canvas.width-paddleWidth)/2;

let rightPressed = false;
let leftPressed = false;

document.addEventListener("keydown", e => {
  if(e.key === "Right") rightPressed = true;
  if(e.key === "Left") leftPressed = true;
});
document.addEventListener("keyup", e => {
  if(e.key === "Right") rightPressed = false;
  if(e.key === "Left") leftPressed = false;
});

function drawBall() {
  ctx.beginPath();
  ctx.arc(x,y,10,0,Math.PI*2);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.beginPath();
  ctx.rect(paddleX, canvas.height-paddleHeight, paddleWidth, paddleHeight);
  ctx.fillStyle = "white";
  ctx.fill();
  ctx.closePath();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBall();
  drawPaddle();

  if(x + dx > canvas.width-10 || x + dx < 10) dx = -dx;
  if(y + dy < 10) dy = -dy;
  else if(y + dy > canvas.height-10) {
    if(x > paddleX && x < paddleX + paddleWidth) {
      dy = -dy;
    } else {
      alert("Game Over");
      document.location.reload();
    }
  }

  if(rightPressed && paddleX < canvas.width-paddleWidth) paddleX += 5;
  if(leftPressed && paddleX > 0) paddleX -= 5;

  x += dx;
  y += dy;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
